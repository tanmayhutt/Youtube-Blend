services:
  backend:
    build:
      context: ./backend
    env_file: .env
    environment:
      PORT: 8000
      MONGO_URI: ${MONGO_URI}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      DEPLOYED_DOMAIN: ${DEPLOYED_DOMAIN}
      FRONTEND_URL: ${FRONTEND_URL}
      ENABLE_DEBUG: ${ENABLE_DEBUG:-false}
      ENABLE_FALLBACK: ${ENABLE_FALLBACK:-false}
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

# ---------- Notes ----------
# Vercel handles external domain routing (rewrites in root vercel.json)
# so we don't need Caddy or any reverse proxy here.
#
# For local development WITHOUT Vercel proxy, add Caddy back:
#   caddy:
#     image: caddy:2
#     ports: ["80:80", "443:443"]
#     volumes: ["./Caddyfile:/etc/caddy/Caddyfile:ro"]
